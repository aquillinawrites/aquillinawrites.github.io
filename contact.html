<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Aquillina Ngowera</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">

  <style>
    .comic-contact { background-color: var(--newsprint); color: var(--ink); padding: 4rem 2rem; margin-top: 1rem; border: 3px solid var(--burgundy); box-shadow: 8px 8px 0px var(--burgundy-dark); text-align: left; }
    .contact-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px double var(--burgundy); padding-bottom: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; gap: 2rem; }
    .contact-title { font-family: 'Special Elite', cursive; font-size: clamp(3rem, 6vw, 5rem); color: var(--burgundy); line-height: 1; margin: 0; }
    .contact-info p { margin: 0.5rem 0; font-family: 'IM Fell English', serif; font-size: 1.1rem; color: var(--ink); }
    .contact-info i { margin-right: 10px; color: var(--burgundy); }
    .contact-info span { color: var(--burgundy); font-weight: bold; }
    .form-cols { display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; }
    .col-left { display: flex; flex-direction: column; gap: 1rem; }
    .col-left input, .col-right textarea { background-color: var(--cream); border: 2px solid var(--ink); padding: 1rem; font-family: 'IM Fell English', serif; font-size: 1.1rem; color: var(--ink); width: 100%; }
    ::placeholder { color: #666; font-style: italic; }
    .col-right textarea { height: 100%; min-height: 150px; resize: none; }
    .col-left input:focus, .col-right textarea:focus { outline: none; border-color: var(--burgundy); box-shadow: 4px 4px 0px var(--gold); }
    .send-btn { background-color: var(--gold); color: var(--ink); border: 2px solid var(--ink); padding: 0.6rem 2.5rem; font-size: 1.2rem; font-family: 'Special Elite', cursive; margin-top: 1.5rem; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; }
    .send-btn:hover { background-color: var(--burgundy); color: white; transform: translate(-2px, -2px); box-shadow: 4px 4px 0px var(--ink); }
    .social-footer { display: flex; justify-content: center; gap: 1.5rem; margin-top: 4rem; }
    .social-circle { display: flex; align-items: center; justify-content: center; width: 60px; height: 60px; background-color: var(--cream); color: var(--burgundy); border: 2px solid var(--ink); border-radius: 50%; text-decoration: none; font-size: 1.8rem; transition: all 0.3s; box-shadow: 3px 3px 0px var(--burgundy); }
    .social-circle:hover { background-color: var(--burgundy); color: white; transform: translate(-3px, -3px); box-shadow: 6px 6px 0px var(--gold); }
    @media (max-width: 768px) { .form-cols { grid-template-columns: 1fr; } .contact-header { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <header class="masthead">
    <div class="masthead-date">Est. 2018 — Vol. I</div>
    <h1 class="masthead-title">AQUILLINA NGOWERA</h1>
    <div class="masthead-tagline" style="font-family: 'IM Fell English', serif; font-style: italic; font-size: 1.2rem; margin-bottom: 1.5rem;">Writer. Editor. Storyteller</div>
    <nav class="masthead-nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="blog.html">Blog</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="container text-center">
    
    <div class="scroll-reveal" style="margin: 2rem 0 4rem;">
      <h2 style="font-size: clamp(3.5rem, 8vw, 6rem); font-family: 'Playfair Display', serif; color: var(--burgundy); line-height: 1.1; letter-spacing: -2px;">Thanks for <br>stopping by.</h2>
    </div>

    <section class="comic-contact scroll-reveal">
      <div class="contact-header">
        <h2 class="contact-title">CONTACT ME</h2>
        <div class="contact-info">
          <p><i class="fa-solid fa-address-card"></i> <strong>Address //</strong> Chiredzi, Zimbabwe</p>
          <p><i class="fa-solid fa-phone"></i> <strong>Telephone. //</strong> +263 77 439 5998</p>
          <p><i class="fa-solid fa-envelope"></i> <strong>E-Mail //</strong> <span>angowera@gmail.com</span></p>
        </div>
      </div>

      <!-- Notice the link below is now perfectly formatted! -->
      <form action="https://formspree.io/f/maqvnjob" method="POST" class="contact-form">
        <div class="form-cols">
          <div class="col-left">
            <input type="text" name="name" placeholder="Your Name*" required>
            <input type="email" name="email" placeholder="Your e-mail address*" required>
            <input type="text" name="subject" placeholder="Subject">
          </div>
          <div class="col-right">
            <textarea name="message" placeholder="Type your message here.." required></textarea>
          </div>
        </div>
        <div style="text-align: center;">
          <button type="submit" class="send-btn">SEND!</button>
        </div>
      </form>

      <div class="social-footer">
        <a href="https://www.linkedin.com/in/aquillina-panashe-ngowera/" target="_blank" class="social-circle"><i class="fa-brands fa-linkedin-in"></i></a>
        <a href="https://www.facebook.com/aqua.ngowera" target="_blank" class="social-circle"><i class="fa-brands fa-facebook-f"></i></a>
      </div>
    </section>

  </main>
  
  <script src="js/main.js"></script>
</body>
</html>
